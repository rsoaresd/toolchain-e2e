apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - service-accounts.yaml
  - deployment.yaml
  - dynamic-plugins-root-pvc.yaml
  - service.yaml
  - route.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: restart-rhdh-script
    options:
      annotations:
        argocd.argoproj.io/sync-options: Replace=true
    files:
      - restart-rhdh.sh=restart-rhdh.sh